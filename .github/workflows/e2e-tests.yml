name: E2E Tests

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '0 2 * * *' # Daily at 2am UTC

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: engageninja
          POSTGRES_PASSWORD: engageninja
          POSTGRES_DB: engageninja
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup database
        run: pnpm run prepare-db
        env:
          DATABASE_URL: postgresql://engageninja:engageninja@localhost:5433/engageninja

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: web

      - name: Start API server
        run: |
          cd api
          timeout 60 bash -c 'pnpm run start:dev &'
        env:
          DATABASE_URL: postgresql://engageninja:engageninja@localhost:5433/engageninja
          JWT_SECRET: test-jwt-secret-12345
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-12345
          API_PORT: 3000
          NODE_ENV: test

      - name: Wait for API
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000/health 2>/dev/null; do sleep 2; done' || true

      - name: Start Web server
        run: |
          cd web
          timeout 60 bash -c 'pnpm run dev &'
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NODE_ENV: development

      - name: Wait for Web
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3001 2>/dev/null; do sleep 2; done' || true

      - name: Run E2E tests
        run: pnpm --filter web run test:e2e
        env:
          E2E_WEB_URL: http://localhost:3001
          E2E_API_URL: http://localhost:3000
          DATABASE_URL: postgresql://engageninja:engageninja@localhost:5433/engageninja

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: web/test-results/
          retention-days: 7
